services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-luminotype}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-luminotype}
      POSTGRES_DB: ${POSTGRES_DB:-luminotype}
    ports:
      # Published so local `pnpm dev` / `pnpm seed` can reach the database.
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-luminotype} -d ${POSTGRES_DB:-luminotype}']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://luminotype:luminotype@db:5432/luminotype}
      PORT: 3001
    depends_on:
      db:
        condition: service_healthy
    expose:
      - '3001'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '${WEB_PORT:-8080}:80'

volumes:
  db-data:
